apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: bankapp
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/shettymalathib/AI-BankApp-DevOps.git
    targetRevision: master
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: bankapp

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
name: GitOps CI/CD Pipeline

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "pom.xml"
      - "Dockerfile"
      - "k8s/**"
  workflow_dispatch:

concurrency:
  group: bankapp-ci
  cancel-in-progress: true

permissions:
  contents: write

env:
  DOCKERHUB_REPO: shettymalathi113/ai-bankapp-eks

jobs:

  # -----------------------------
  # Job 1 - Test
  # -----------------------------
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: Test@123
          MYSQL_DATABASE: bankappdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pTest@123"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Run Unit Tests
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_DATABASE: bankappdb
          MYSQL_USER: root
          MYSQL_PASSWORD: Test@123
        run: ./mvnw clean test -B

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports

  # -----------------------------
  # Job 2 - Build
  # -----------------------------
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build Application
        run: ./mvnw clean package -DskipTests -B

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: bankapp-jar
          path: target/*.jar

  # -----------------------------
  # Job 3 - Docker
  # -----------------------------
  docker:
    needs: build
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.vars.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: bankapp-jar
          path: target

      - name: Generate Image Tag
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ steps.vars.outputs.sha }}
            ${{ env.DOCKERHUB_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -----------------------------
  # Job 4 - GitOps
  # -----------------------------
  gitops:
    needs: docker
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update Deployment Manifest
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)

          sed -i "s|image: ${{ env.DOCKERHUB_REPO }}:.*|image: ${{ env.DOCKERHUB_REPO }}:${IMAGE_TAG}|" k8s/bankapp-deployment.yml

          echo "Updated Deployment:"
          grep image k8s/bankapp-deployment.yml

      - name: Commit Updated Manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/bankapp-deployment.yml

          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          IMAGE_TAG=$(git rev-parse --short HEAD)

          git commit -m "ci: update image to ${IMAGE_TAG} [skip ci]"
          git push origin HEAD:master
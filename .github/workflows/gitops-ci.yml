name: GitOps CI - Build & Push to DockerHub

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "pom.xml"
      - "Dockerfile"
  workflow_dispatch:

concurrency:
  group: bankapp-ci
  cancel-in-progress: true

permissions:
  contents: write

env:
  DOCKERHUB_REPO: shettymalathi113/ai-bankapp-eks

jobs:
  build-and-push:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: Test@123
          MYSQL_DATABASE: bankappdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pTest@123"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Tests
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_DATABASE: bankappdb
          MYSQL_USER: root
          MYSQL_PASSWORD: Test@123
        run: ./mvnw clean verify -B

      - name: Show Surefire Reports
        if: always()
        run: |
          echo "===== Surefire Reports ====="
          find target/surefire-reports -type f \
            -exec echo "==== {} ====" \; \
            -exec cat {} \;

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports

      - name: Set Image Tag
        id: vars
        run: echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ steps.vars.outputs.SHA }}
            ${{ env.DOCKERHUB_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Kubernetes Deployment Manifest
        run: |
          sed -i "s|image: ${{ env.DOCKERHUB_REPO }}:.*|image: ${{ env.DOCKERHUB_REPO }}:${{ steps.vars.outputs.SHA }}|" k8s/bankapp-deployment.yml

          echo "Updated deployment:"
          grep image k8s/bankapp-deployment.yml

      - name: Commit Updated Manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/bankapp-deployment.yml

          if git diff --cached --quiet; then
            echo "No deployment changes."
            exit 0
          fi

          git commit -m "ci: update image to ${{ steps.vars.outputs.SHA }} [skip ci]"
          git push origin HEAD:master